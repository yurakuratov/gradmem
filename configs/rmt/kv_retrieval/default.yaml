# RMT on KV-retrieval - default configuration

model:
  base_model: gpt2
  n_layer: 4
  n_head: 4
  n_embd: 128
  max_position_embeddings: 1024

training:
  per_device_batch_size: 64
  total_batch_size: 64
  learning_rate: 1.0e-4
  max_steps: 200000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 142

dataset:
  data_name: "N8-K2V2-V62_1M"
  tokenizer_path: "./tokenizers/kv_alphabet_62/"

rmt:
  n_mem_tokens: 8
  n_controller_tokens: 0