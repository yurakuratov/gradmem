# RMT on phonebook - default configuration

model:
  pretrained_model: gpt2

training:
  per_device_batch_size: 128
  total_batch_size: 256
  learning_rate: 1.0e-3
  lr_scheduler_type: "constant_with_warmup"
  max_steps: 200000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 142

dataset:
  data_name: "booydar/phonebook_N2"
  tokenizer_path: "./tokenizers/kv_alphabet_62/"

rmt:
  n_mem_tokens: 32
  n_controller_tokens: 0
  K: 1
  use_mem_proj: true
  mem_proj_mode: "proj"
  use_write_head: true