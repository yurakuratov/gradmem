# RMT on SQuAD - default configuration

model:
  pretrained_model: gpt2

training:
  per_device_batch_size: 16
  total_batch_size: 64
  learning_rate: 3.0e-4
  lr_scheduler_type: "constant_with_warmup"
  max_steps: 75000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 142

dataset:
  data_name: "squad"

rmt:
  n_mem_tokens: 64
  n_controller_tokens: 0
  K: 1
  use_mem_proj: true
  mem_proj_mode: "proj"
  use_write_head: true