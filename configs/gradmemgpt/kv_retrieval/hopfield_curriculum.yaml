# GradMemGPT with Hopfield-like external memory + curriculum learning
# Progresses through KV-retrieval datasets of increasing difficulty

model:
  base_model: gpt2
  n_layer: 4
  n_head: 4
  n_embd: 128

training:
  per_device_batch_size: 64
  total_batch_size: 64
  learning_rate: 1.0e-4
  max_steps: 1000000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 143

dataset:
  data_path: "./data/N4-K2V2-V62_1M"
  tokenizer_path: "./tokenizers/kv_alphabet_62/"

gradmem:
  n_mem_tokens: 8
  n_ctrl_tokens: 0
  K: 2
  last_K_second_order: null
  inner_lr: 0.04
  inner_clip_value: null
  inner_clip_norm: null
  use_adam: false
  grad_mode: "second"
  use_mem_proj: false
  mem_proj_mode: "none"
  use_write_head: true
  add_inner_loss_to_outer: true
  inner_loss_weight: 0.5
  memory_update: gradient
  use_mem_residual: false
  use_reconstruction_loss: false
  reconstruction_loss_weight: 1.0

hopfield:
  use_hopfield_memory: true
  hopfield_n_segments: 2
  hopfield_retrieval_mode: raw
  hopfield_beta_init: 1.0
  use_separate_hopfield_mem: true
  hopfield_proj_dim: null
  hopfield_direct_query: false
  hopfield_value_as_key: true

curriculum:
  enabled: true
  threshold: 0.95
  levels: "4,8,16,32,64,128"
  data_dir: "./data"
  stage_overrides:
    1: {inner_lr: 0.02}
    2: {inner_lr: 0.01}
    3: {inner_lr: 0.005}
    4: {inner_lr: 0.002}
    5: {inner_lr: 0.001}