# GradMemGPT with Hopfield-like external memory

model:
  base_model: gpt2
  n_layer: 4
  n_head: 4
  n_embd: 128

training:
  per_device_batch_size: 64
  total_batch_size: 64
  learning_rate: 1.0e-4
  max_steps: 1000000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 143

dataset:
  data_path: "./data/N4-K2V2-V62_1M"
  tokenizer_path: "./tokenizers/kv_alphabet_62/"

gradmem:
  n_mem_tokens: 8
  n_ctrl_tokens: 0
  K: 2
  last_K_second_order: 2
  inner_lr: 0.04
  inner_clip_value: null
  inner_clip_norm: null
  use_adam: false
  grad_mode: "second"
  use_mem_proj: false
  mem_proj_mode: "none"
  use_write_head: true
  add_inner_loss_to_outer: true
  inner_loss_weight: 0.5

hopfield:
  use_hopfield_memory: true
  hopfield_n_segments: 2
  hopfield_retrieval_mode: "softmax"  # raw | softmax | beta_softmax
  hopfield_beta_init: 1.0
  use_separate_hopfield_mem: false
  hopfield_proj_dim: null