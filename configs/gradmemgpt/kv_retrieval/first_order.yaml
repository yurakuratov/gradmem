# GradMemGPT ablation: first-order gradient (faster, less VRAM)

model:
  base_model: gpt2
  n_layer: 4
  n_head: 4
  n_embd: 128

training:
  per_device_batch_size: 64
  total_batch_size: 64
  learning_rate: 1.0e-4
  max_steps: 1000000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 142

dataset:
  data_name: "N8-K2V2-V62_1M"
  tokenizer_path: "./tokenizers/kv_alphabet_62/"

gradmem:
  n_mem_tokens: 8
  n_ctrl_tokens: 0
  K: 2
  last_K_second_order: 2
  inner_lr: 0.04
  inner_clip_value: null
  inner_clip_norm: null
  use_adam: false
  grad_mode: "first"
  use_mem_proj: false
  mem_proj_mode: "none"
  use_write_head: true
  add_inner_loss_to_outer: false