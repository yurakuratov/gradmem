# GradMemGPT on phonebook - default configuration

model:
  pretrained_model: gpt2

training:
  per_device_batch_size: 64
  total_batch_size: 256
  learning_rate: 1.0e-4
  max_steps: 200000
  eval_steps: 500
  logging_steps: 500
  warmup_steps: 10000
  early_stopping_patience: 500
  seed: 142

dataset:
  data_name: "booydar/phonebook_N2"
  tokenizer_path: "./tokenizers/kv_alphabet_62/"

gradmem:
  n_mem_tokens: 32
  n_ctrl_tokens: 0
  K: 2
  inner_lr: 0.4
  use_adam: false
  grad_mode: "second"
  use_mem_proj: true
  mem_proj_mode: "proj"
  use_write_head: true